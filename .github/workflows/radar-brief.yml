name: AI Release Radar Brief

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

jobs:
  run-radar-brief:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      RADAR_MODE: brief

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set radar date
        id: radar-date
        run: echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Prepare selected release cache
        # Key con run_id para que cada brief escriba su propio cache.
        # Restore-keys deja que content tome el cache mas reciente del dia.
        uses: actions/cache@v4
        with:
          path: selected_release.json
          key: selected-release-${{ steps.radar-date.outputs.date }}-${{ github.run_id }}
          restore-keys: |
            selected-release-${{ steps.radar-date.outputs.date }}-

      - name: Restore release history cache
        uses: actions/cache@v4
        with:
          path: |
            history_brief.json
            history_content.json
          key: release-history-${{ steps.radar-date.outputs.date }}-${{ github.run_id }}
          restore-keys: |
            release-history-${{ steps.radar-date.outputs.date }}-
            release-history-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run radar brief
        run: python daily_brief.py
