name: AI Release Radar Content

on:
  workflow_dispatch:
    inputs:
      choice:
        description: "Número del release (1, 2 o 3)"
        required: false
  schedule:
    - cron: "10 12 * * *"

jobs:
  run-radar-content:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      RADAR_MODE: content
      SELECT_CHOICE: ${{ github.event.inputs.choice }}
      GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set radar date
        id: radar-date
        run: echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Restore selected release cache
        # No usamos fail-on-cache-miss: si no hay cache (p.ej. el Worker
        # dispara content sin que el brief de hoy haya corrido), el script
        # reconstruye el Top 3 al vuelo y entrega contenido igual.
        # Restore-keys siempre toma el cache mas reciente del dia.
        uses: actions/cache@v4
        with:
          path: selected_release.json
          key: selected-release-${{ steps.radar-date.outputs.date }}-${{ github.run_id }}
          restore-keys: |
            selected-release-${{ steps.radar-date.outputs.date }}-

      - name: Restore release history cache
        uses: actions/cache@v4
        with:
          path: |
            history_brief.json
            history_content.json
          key: release-history-${{ steps.radar-date.outputs.date }}-${{ github.run_id }}
          restore-keys: |
            release-history-${{ steps.radar-date.outputs.date }}-
            release-history-

      - name: Restore editorial memory (published log)
        uses: actions/cache@v4
        with:
          path: published_log.json
          key: published-log-${{ steps.radar-date.outputs.date }}-${{ github.run_id }}
          restore-keys: |
            published-log-${{ steps.radar-date.outputs.date }}-
            published-log-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run radar content
        run: python daily_brief.py
