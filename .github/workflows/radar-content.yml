name: AI Release Radar Content

on:
  workflow_dispatch:
    inputs:
      choice:
        description: "Número del release (1, 2 o 3)"
        required: false
  schedule:
    - cron: "10 12 * * *"

jobs:
  run-radar-content:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      RADAR_MODE: content
      SELECT_CHOICE: ${{ github.event.inputs.choice }}
      GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set radar date
        id: radar-date
        run: echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Restore selected release cache
        uses: actions/cache@v4
        with:
          path: selected_release.json
          key: selected-release-${{ steps.radar-date.outputs.date }}
          fail-on-cache-miss: true

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run radar content
        run: python daily_brief.py
